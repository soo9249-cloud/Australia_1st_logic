# Render.com 배포 스펙 — Python 웹서비스 1개 (FastAPI + Uvicorn)
# render_api.py 가 브라우저 요청을 받아 crawler/ 를 실행하고 Supabase 에 저장한다.
#
# requirements.txt 는 README 와 같이 저장소 루트에만 둔다(중복 파일 없음).
# rootDir: . 는 Git 리포지토리 루트를 서비스 루트로 고정한다. (대시보드에서 upharma-au 로
# 잡혀 있던 설정을 Blueprint 로 덮어써 루트 requirements.txt 가 빌드에 포함되게 함)
# 첫 반영 후에도 루트가 안 바뀌면 대시보드 Settings → Root Directory 를 비우거나
# Blueprint 동기화(Apply) 를 한 번 더 실행한다.

services:
  - type: web
    name: upharma-au
    rootDir: .
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_api:app --app-dir upharma-au --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
