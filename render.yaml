# Render.com 배포 스펙 — Python 웹서비스 1개 (FastAPI + Uvicorn)
# render_api.py 가 브라우저 요청을 받아 crawler/ 를 실행하고 Supabase 에 저장한다.
#
# requirements.txt 는 저장소 최상위 한 곳. 빌드는 GitHub raw + $RENDER_GIT_COMMIT URL 로 pip 설치(공개 저장소).

services:
  - type: web
    name: upharma-au
    env: python
    plan: free
    region: singapore
    # 빌드 cwd 와 무관하게 GitHub raw(현재 커밋)에서 requirements 설치. sh -c 로 호환성 확보.
    buildCommand: 'sh -c "pip install -r https://raw.githubusercontent.com/soo9249-cloud/Australia_1st_logic/$RENDER_GIT_COMMIT/requirements.txt"'
    # 루트면 --app-dir upharma-au / Root 가 upharma-au 면 같은 디렉터리에 render_api.py
    startCommand: 'sh -c "if [ -f render_api.py ]; then exec uvicorn render_api:app --host 0.0.0.0 --port $PORT; else exec uvicorn render_api:app --app-dir upharma-au --host 0.0.0.0 --port $PORT; fi"'
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
