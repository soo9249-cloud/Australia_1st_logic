# Render.com 배포 스펙 — Python 웹서비스 1개 (FastAPI + Uvicorn)
# render_api.py 가 브라우저 요청을 받아 crawler/ 를 실행하고 Supabase 에 저장한다.
#
# 정본: 저장소 루트 requirements.txt (로컬·GHA·문서 기준).
# Render Root Directory 가 upharma-au 이면 루트 파일이 빌드에 안 들어가므로
# upharma-au/requirements.txt 를 같은 내용으로 둔다. Root 를 비우면 루트 파일만 쓰면 된다.

services:
  - type: web
    name: upharma-au
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_api:app --app-dir upharma-au --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
