# Render.com 배포 스펙 — Python 웹서비스 1개 (FastAPI + Uvicorn)
# render_api.py 가 브라우저 요청을 받아 crawler/ 를 실행하고 Supabase 에 저장한다.
#
# Root Directory 가 (1) 저장소 루트 이거나 (2) upharma-au 인 경우 모두 동작하도록
# 빌드/기동 명령을 분기한다. (대시보드에서 Root Directory 만 다르면 이전엔 빌드가 깨짐)

services:
  - type: web
    name: upharma-au
    env: python
    plan: free
    region: singapore
    # 한 줄: Root Directory 가 루트면 ./requirements.txt, 가 upharma-au 면 ../requirements.txt
    buildCommand: sh -c 'if [ -f requirements.txt ]; then pip install -r requirements.txt; elif [ -f ../requirements.txt ]; then pip install -r ../requirements.txt; else echo "requirements.txt not found"; exit 1; fi'
    startCommand: sh -c 'if [ -f render_api.py ]; then exec uvicorn render_api:app --host 0.0.0.0 --port $PORT; else exec uvicorn render_api:app --app-dir upharma-au --host 0.0.0.0 --port $PORT; fi'
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
