# Render.com 배포 스펙 — Python 웹서비스 1개 (FastAPI + Uvicorn)
# render_api.py 가 브라우저 요청을 받아 crawler/ 를 실행하고 Supabase 에 저장한다.
#
# pip install -r requirements.txt 는 서비스 Root Directory 기준이다.
# 루트에만 있던 requirements.txt 는 Root 가 upharma-au 일 때 빌드에 안 들어와 실패함.
# upharma-au/requirements.txt 를 루트와 동일하게 두어 두 설정 모두 동작하게 한다.

services:
  - type: web
    name: upharma-au
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_api:app --app-dir upharma-au --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
