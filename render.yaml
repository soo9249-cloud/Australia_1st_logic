# Render.com 배포 스펙 — Python 웹서비스 1개 (FastAPI + Uvicorn)
# render_api.py 가 브라우저 요청을 받아 crawler/ 를 실행하고 Supabase 에 저장한다.
#
# 의존성 목록은 저장소 루트의 requirements.txt 한 곳(README 와 같은 위치)만 쓴다.
# Render 서비스 Root Directory 는 비워 두어(=저장소 루트) 이 파일이 빌드에 포함되게 할 것.
# Root 를 upharma-au 로 두면 루트 밖 파일은 빌드에 넣을 수 없어 pip 가 실패한다.

services:
  - type: web
    name: upharma-au
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_api:app --app-dir upharma-au --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
