# Render.com 배포 스펙 — Python 웹서비스 1개 (FastAPI + Uvicorn)
# render_api.py 가 브라우저 요청을 받아 crawler/ 를 실행하고 Supabase 에 저장한다.
#
# requirements.txt 는 저장소 최상위(README 와 동일 위치) 한 곳만 둔다.
# 대시보드 Root Directory 가 upharma-au 이면 그 폴더 밖 파일이 빌드에 안 들어가
# 로컬 requirements.txt 를 열 수 없다. 이때는 Render 가 주입하는 RENDER_GIT_* 로
# GitHub raw 에서 같은 커밋의 requirements.txt 를 받아 pip 설치한다(공개 저장소).

services:
  - type: web
    name: upharma-au
    env: python
    plan: free
    region: singapore
    # 로컬에 requirements.txt 가 있으면 그걸 쓰고, 없으면 GitHub raw(현재 배포 커밋)로 설치
    buildCommand: 'bash -lc "set -e; if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install -r https://raw.githubusercontent.com/$RENDER_GIT_REPO_SLUG/$RENDER_GIT_COMMIT/requirements.txt; fi"'
    # 루트에서 실행: --app-dir upharma-au / Root 가 upharma-au 이면 같은 폴더에 render_api.py
    startCommand: 'bash -lc "if [ -f render_api.py ]; then exec uvicorn render_api:app --host 0.0.0.0 --port $PORT; else exec uvicorn render_api:app --app-dir upharma-au --host 0.0.0.0 --port $PORT; fi"'
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
